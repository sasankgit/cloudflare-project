<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Agent</title>
  <style>
    :root {
      --primary-orange: #f97316;
      --light-orange: #fff7ed;
      --dark-orange: #ea580c;
      --bg-gray: #f4f4f5;
      --border-gray: #e4e4e7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-gray);
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #18181b;
    }

    header {
      background-color: white;
      padding: 1rem;
      border-bottom: 1px solid var(--border-gray);
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--dark-orange);
      font-weight: 600;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .user-message {
      align-self: flex-end;
      background-color: var(--primary-orange);
      color: white;
      border-bottom-right-radius: 0;
    }

    .ai-message {
      align-self: flex-start;
      background-color: white;
      border: 1px solid var(--border-gray);
      border-bottom-left-radius: 0;
    }

    .input-area {
      background-color: white;
      padding: 1rem;
      border-top: 1px solid var(--border-gray);
      display: flex;
      gap: 0.75rem;
    }

    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-gray);
      border-radius: 0.375rem;
      outline: none;
      font-size: 0.95rem;
    }

    input:focus {
      border-color: var(--primary-orange);
      box-shadow: 0 0 0 2px var(--light-orange);
    }

    button {
      background-color: var(--primary-orange);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--dark-orange);
    }

    button:disabled {
      background-color: #fdba74;
      cursor: not-allowed;
    }

    #loading {
      display: none;
      font-size: 0.85rem;
      color: #71717a;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>AI Chat Agent Project for cloud flare</h1>
  </header>

  <div id="chat-container">
    <div class="message ai-message">Hello. How can I assist you today?</div>
  </div>

  <div class="input-area">
    <div id="status-container" style="display: flex; flex-direction: column; width: 100%;">
      <div id="loading">Assistant is thinking...</div>
      <div style="display: flex; gap: 0.75rem; width: 100%;">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    function appendMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}-message`;
      msgDiv.textContent = text;
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Disable UI
      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;
      loading.style.display = 'block';

      // Add user message to UI
      appendMessage('user', message);

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        
        if (data.reply) {
          appendMessage('ai', data.reply);
        } else {
          appendMessage('ai', "Error: Could not get a response.");
        }
      } catch (error) {
        appendMessage('ai', "Error: Connection failed.");
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        loading.style.display = 'none';
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
